<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Verdana,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4e54c8,#8f94fb);
}

.card{
    width:400px;
    padding:30px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.circle{
    width:220px;
    height:220px;
    margin:auto;
    border-radius:50%;
    border:8px solid #00ffe7;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 25px #00ffe7;
}

#time{
    font-size:32px;
    color:white;
    font-weight:bold;
}

.buttons{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

button{
    padding:12px;
    border:none;
    border-radius:40px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.start{background:#00c853;}
.stop{background:#d50000;}
.reset{background:#ff9100;}
.lap{background:#2962ff;}

#laps{
    margin-top:25px;
    max-height:180px;
    overflow:auto;
    text-align:left;
}

.lapItem{
    background:rgba(255,255,255,.2);
    color:white;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}
</style>

</head>
<body>

<div class="card">

<h2 style="color:white;margin-bottom:20px;">⏱ Neon Stopwatch</h2>

<div class="circle">
<div id="time">00:00:00</div>
</div>

<div class="buttons">
<button class="start" onclick="start()">▶ Start</button>
<button class="stop" onclick="stopWatch()">⏸ Stop</button>
<button class="reset" onclick="resetWatch()">↺ Reset</button>
<button class="lap" onclick="lap()">🏁 Lap</button>
</div>

<div id="laps"></div>

</div>

<script>

let hr=0,min=0,sec=0;
let timer=null;
let lapNo=1;

function display(){
document.getElementById("time").innerHTML=
String(hr).padStart(2,'0')+":"+
String(min).padStart(2,'0')+":"+
String(sec).padStart(2,'0');
}

function run(){
sec++;

if(sec==60){
sec=0;
min++;
}

if(min==60){
min=0;
hr++;
}

display();
}

function start(){
if(timer!=null) return;
timer=setInterval(run,1000);
}

function stopWatch(){
clearInterval(timer);
timer=null;
}

function resetWatch(){
stopWatch();
hr=0;
min=0;
sec=0;
lapNo=1;
display();
document.getElementById("laps").innerHTML="";
}

function lap(){

if(timer==null) return;

let lapTime=
String(hr).padStart(2,'0')+":"+
String(min).padStart(2,'0')+":"+
String(sec).padStart(2,'0');

let div=document.createElement("div");
div.className="lapItem";

div.innerHTML="<span>Lap "+lapNo+"</span><span>"+lapTime+"</span>";

document.getElementById("laps").prepend(div);

lapNo++;

}

display();

</script>

</body>
</html>
